  <text x="100" y="126" font-family="Arial" font-size="40" fill="#dbf8ff">Django Routing Snapshot</text>
  <text x="100" y="182" font-family="Arial" font-size="24" fill="#a8e9ff">/tracks -> /playlist/<id> -> /playlist/add/<song_id></text>
